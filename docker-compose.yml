version: "3.8"

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: evidence_seeker
      POSTGRES_USER: evidence_user
      POSTGRES_PASSWORD: evidence_password
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evidence_user -d evidence_seeker"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - evidence-seeker-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://evidence_user:evidence_password@db:5432/evidence_seeker
      - SECRET_KEY=your-super-secret-key-change-in-production
      - DEBUG=true
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
      - JWT_SECRET_KEY=your-jwt-secret-key-change-in-production
      - LOG_LEVEL=INFO
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ./backend:/app
    networks:
      - evidence-seeker-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - evidence-seeker-network
    command: npm run dev -- --host 0.0.0.0

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - evidence-seeker-network

  # Development tools
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - evidence-seeker-network
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:

networks:
  evidence-seeker-network:
    driver: bridge
