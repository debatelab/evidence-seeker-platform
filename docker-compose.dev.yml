# Development environment - Hybrid Approach
# Only database and supporting services run in Docker
# Backend and frontend run locally for fast hot-reloading

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: evidence_seeker_dev
      POSTGRES_USER: evidence_user
      POSTGRES_PASSWORD: evidence_password
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evidence_user -d evidence_seeker_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - evidence-seeker-network

  # Development tools
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - evidence-seeker-network
    command: redis-server --appendonly yes
    profiles:
      - tools

  # Testing database
  test_db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: evidence_seeker_test
      POSTGRES_USER: evidence_user
      POSTGRES_PASSWORD: evidence_password
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - test_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evidence_user -d evidence_seeker_test"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - evidence-seeker-network
    profiles:
      - testing

volumes:
  postgres_data:
  test_postgres_data:
  redis_data:

networks:
  evidence-seeker-network:
    driver: bridge
