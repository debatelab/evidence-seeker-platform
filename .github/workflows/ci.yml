name: CI Pipeline

# NOTE: All actions pinned to exact commit SHAs for supply-chain hardening.
# Original release tags retained in comments. Refresh periodically (e.g. quarterly)
# by checking upstream release tags and updating SHAs.

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Backend linting and testing
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@eb1897b8dc4b5d5bfe39a428a8f2304605e0983c # v7.0.0
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          cd backend
          uv venv .venv
          . .venv/bin/activate
          uv pip install -e .[dev]

      - name: Run Black
        run: |
          cd backend
          . .venv/bin/activate
          black --check --diff .

      - name: Run Ruff
        run: |
          cd backend
          . .venv/bin/activate
          ruff check .

      - name: Run mypy
        env:
          MYPYPATH: ${{ github.workspace }}/backend
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          echo "ROOT PWD=$(pwd)"
          ls -la backend/app | head -n 20 || true
          . backend/.venv/bin/activate
          cd backend
          echo "BACKEND PWD=$(pwd)"
          echo "MYPYPATH=${MYPYPATH}"
          echo "PYTHONPATH=${PYTHONPATH}"
          python -c "import app, app.models.user as u; print('python import ok:', app.__file__)"
          mypy --version
          mypy .

      - name: Run tests
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
        run: |
          cd backend
          . .venv/bin/activate
          pytest -v --cov=app --cov-report=term-missing

  # Frontend linting, type checking and tests
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: '24.0.2'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint

      - name: Run TypeScript type check
        run: |
          cd frontend
          npm run typecheck

      - name: Run frontend tests
        run: |
          cd frontend
          npm run test:ci

  # Security scanning
  security:
    runs-on: ubuntu-latest
    env:
      ADV_SECURITY_ENABLED: ${{ vars.ADV_SECURITY_ENABLED || 'false' }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Disk usage before security scan
        run: |
          echo "Disk usage before Trivy:" && df -h
          docker system df || true

      - name: Run Trivy vulnerability scanner (main branches only, only if Advanced Security enabled)
        if: github.ref == 'refs/heads/main' && env.ADV_SECURITY_ENABLED == 'true'
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # 0.33.1
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Run Trivy secret scan (always, lightweight)
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # 0.33.1
        with:
          scanners: 'secret'
          scan-type: 'fs'
          scan-ref: '.'
          exit-code: '0'
          format: 'table'
          ignore-unfixed: true

      - name: Upload Trivy scan results to GitHub Security tab
        if: github.ref == 'refs/heads/main' && env.ADV_SECURITY_ENABLED == 'true'
        uses: github/codeql-action/upload-sarif@ffc75c6ceb2db9503b506980b540a260124f1137 # v4
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Upload Trivy SARIF artifact (Advanced Security disabled)
        if: github.ref == 'refs/heads/main' && env.ADV_SECURITY_ENABLED != 'true'
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.4.0
        with:
          name: trivy-scan-sarif-disabled
          path: trivy-results.sarif
          if-no-files-found: ignore

      - name: Disk usage after security scan
        run: |
          echo "Disk usage after Trivy:" && df -h
          docker system df || true

  # Build and push backend container image
  build-backend:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_OWNER: debatelab
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Free disk space
        run: |
          echo "Before cleanup:" && df -h
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/share/boost
          docker system prune -af --volumes || true
          docker builder prune -af || true
          echo "After cleanup:" && df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
        with:
          install: true

      - name: Login to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/evidence-backend:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/evidence-backend:latest
            ${{ (startsWith(github.ref, 'refs/tags/') && format('{0}/{1}/evidence-backend:{2}', env.REGISTRY, env.IMAGE_OWNER, github.ref_name)) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Post-build cleanup
        run: |
          docker image prune -af || true
          docker builder prune -af || true
          echo "Disk usage after build:" && df -h
          docker system df || true

  # Build and push frontend container image
  build-frontend:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_OWNER: debatelab
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Free disk space
        run: |
          echo "Before cleanup:" && df -h
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/share/boost
          docker system prune -af --volumes || true
          docker builder prune -af || true
          echo "After cleanup:" && df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
        with:
          install: true

      - name: Login to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push frontend image with retry
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        with:
          context: .
          file: ./frontend/Dockerfile
          build-args: |
            VITE_API_URL=${{ vars.FRONTEND_API_URL || 'https://evidence-seeker.philosophie.kit.edu/api/v1' }}
          push: true
          provenance: false
          # Layer cache locations
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/evidence-frontend:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/evidence-frontend:latest
            ${{ (startsWith(github.ref, 'refs/tags/') && format('{0}/{1}/evidence-frontend:{2}', env.REGISTRY, env.IMAGE_OWNER, github.ref_name)) || '' }}

      - name: Verify frontend image was pushed
        run: |
          echo "Verifying frontend image exists in registry..."
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/evidence-frontend:sha-${{ github.sha }}
          echo "Frontend image verified successfully"


      - name: Post-build cleanup
        run: |
          docker image prune -af || true
          docker builder prune -af || true
          echo "Disk usage after build:" && df -h
          docker system df || true
