name: CI Pipeline

# NOTE: All actions pinned to exact commit SHAs for supply-chain hardening.
# Original release tags retained in comments. Refresh periodically (e.g. quarterly)
# by checking upstream release tags and updating SHAs.

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Backend linting and testing
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@eb1897b8dc4b5d5bfe39a428a8f2304605e0983c # v7.0.0
        with:
          version: "latest"

      - name: Install dependencies
      run: |
        cd backend
        uv pip install -e .[dev]

      - name: Run Black
      run: |
        cd backend
        black --check --diff .

      - name: Run Ruff
      run: |
        cd backend
        ruff check .

      - name: Run mypy
      run: |
        cd backend
        mypy .

      - name: Run tests
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
      run: |
        cd backend
        pytest -v --cov=app --cov-report=term-missing

  # Frontend linting and testing
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: '20'

      - name: Install dependencies
      run: |
        cd frontend
        npm ci

      - name: Run ESLint
      run: |
        cd frontend
        npm run lint

      - name: Run TypeScript (build-time) check
      run: |
        cd frontend
        npm run typecheck
  frontend-typecheck:
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: '20'
      - name: Install dependencies
      run: |
        cd frontend
        npm ci
      - name: Full type check (strict)
      run: |
        cd frontend
        npm run typecheck

      - name: Run tests
      run: |
        cd frontend
        npm run test

  # Docker build test
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Build backend Docker image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
      with:
        context: ./backend
        file: ./backend/Dockerfile
        tags: evidence-seeker-backend:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

      - name: Build frontend Docker image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        tags: evidence-seeker-frontend:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Security scanning
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # 0.33.1
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

      - name: Run Trivy secret scan
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # 0.33.1
      with:
        scanners: 'secret'
        scan-type: 'fs'
        scan-ref: '.'
        exit-code: '0' # don't fail build yet, just report
        format: 'table'
        ignore-unfixed: true

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@ffc75c6ceb2db9503b506980b540a260124f1137 # v4
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  # Build and push container images to GHCR (only on main branch or tags)
  build-and-push:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_OWNER: debatelab
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Login to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend image build & push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: true
        provenance: false
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/evidence-backend:sha-${{ github.sha }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/evidence-backend:latest
          ${{ (startsWith(github.ref, 'refs/tags/') && format('{0}/{1}/evidence-backend:{2}', env.REGISTRY, env.IMAGE_OWNER, github.ref_name)) || '' }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

      - name: Frontend image build & push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: true
        provenance: false
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/evidence-frontend:sha-${{ github.sha }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/evidence-frontend:latest
          ${{ (startsWith(github.ref, 'refs/tags/') && format('{0}/{1}/evidence-frontend:{2}', env.REGISTRY, env.IMAGE_OWNER, github.ref_name)) || '' }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "Published backend & frontend images for $GITHUB_SHA"
