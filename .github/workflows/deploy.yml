name: Deploy to Production

# NOTE: Actions pinned to commit SHAs. This workflow assumes CI has already
# built and pushed images tagged with sha-<commit> and 'latest'. We only pull
# and deploy; no building here to avoid duplicate builds.

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: ["completed"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Set up Docker Buildx (for potential compose build/pull caching)
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
      - name: Login to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Deploy over SSH
        uses: appleboy/ssh-action@55dabf81b49d4120609345970c91507e2d734799 # v1.0.0
        env:
          IMAGE_REGISTRY: ghcr.io/debatelab
          BACKEND_TAG: sha-${{ github.sha }}
          FRONTEND_TAG: sha-${{ github.sha }}
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/evidence-seeker-platform

            echo "Pulling images $IMAGE_REGISTRY/evidence-backend:${BACKEND_TAG} and latest fallback"
            docker pull $IMAGE_REGISTRY/evidence-backend:${BACKEND_TAG} || docker pull $IMAGE_REGISTRY/evidence-backend:latest
            docker pull $IMAGE_REGISTRY/evidence-frontend:${FRONTEND_TAG} || docker pull $IMAGE_REGISTRY/evidence-frontend:latest

            # Update docker-compose override (expects env substitution in compose file)
            export BACKEND_IMAGE="$IMAGE_REGISTRY/evidence-backend:${BACKEND_TAG}"
            export FRONTEND_IMAGE="$IMAGE_REGISTRY/evidence-frontend:${FRONTEND_TAG}"

            echo "Stopping existing stack" && docker compose down || true
            echo "Starting updated stack" && docker compose up -d

            echo "Waiting for services" && sleep 20
            curl -fsS http://localhost:8000/health
            curl -fsS http://localhost:3000 > /dev/null

            echo "Running migrations"
            docker compose exec -T backend alembic upgrade head

            echo "Final health verification"
            curl -fsS http://localhost:8000/health > /dev/null
            curl -fsS http://localhost:3000 > /dev/null

            docker image prune -f > /dev/null || true
            echo "Deployment complete"
      - name: Post-deployment smoke tests
        uses: appleboy/ssh-action@55dabf81b49d4120609345970c91507e2d734799 # v1.0.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -euo pipefail
            curl -fsS http://localhost:8000/health > /dev/null
            curl -fsS http://localhost:3000 | grep -q "Evidence Seeker Platform"
            echo "Smoke tests OK"

  # Database backup before deployment
  backup:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Create database backup
        uses: appleboy/ssh-action@55dabf81b49d4120609345970c91507e2d734799 # v1.0.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/evidence-seeker-platform
            BACKUP_FILE="backup_$(date +%Y%m%d_%H%M%S).sql"
            docker compose exec -T db pg_dump -U evidence_user evidence_seeker > $BACKUP_FILE
            gzip $BACKUP_FILE
            ls -t backup_*.sql.gz | tail -n +8 | xargs -r rm || true
            echo "Database backup created: $BACKUP_FILE.gz"

  # Rollback on failure
  rollback:
    runs-on: ubuntu-latest
    environment: production
    needs: [deploy]
    if: failure()
    steps:
      - name: Rollback to previous version
        uses: appleboy/ssh-action@55dabf81b49d4120609345970c91507e2d734799 # v1.0.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/evidence-seeker-platform
            docker compose down || true
            # Pull latest known good images (fallback to latest tag)
            docker compose pull
            docker compose up -d --no-build
            echo "Rollback completed successfully"
