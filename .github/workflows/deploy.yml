name: Deploy to Production

# NOTE: Actions pinned to commit SHAs. This workflow assumes CI has already
# built and pushed images tagged with sha-<commit> and 'latest'. We only pull
# and deploy; no building here to avoid duplicate builds.

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: ["completed"]

jobs:
  wait-for-builds:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Confirm CI succeeded or manual trigger
        run: |
          echo "Proceeding to deploy (event: ${{ github.event_name }})."

  # Database backup before deployment (skip if DB not running)
  backup:
    runs-on: ubuntu-latest
    environment: production
    needs: [wait-for-builds]
    steps:
      - name: Create database backup (if DB is running)
        uses: appleboy/ssh-action@55dabf81b49d4120609345970c91507e2d734799
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/evidence-seeker-platform
            DOCKER_COMPOSE="docker compose --env-file backend/.env.prod -f docker-compose.prod.yml"

            if ${DOCKER_COMPOSE} ps db | grep -q 'Up'; then
              BACKUP_FILE="backup_$(date +%Y%m%d_%H%M%S).sql"
              ${DOCKER_COMPOSE} exec -T db pg_dump -U evidence_user evidence_seeker > "$BACKUP_FILE"
              gzip "$BACKUP_FILE"
              ls -t backup_*.sql.gz | tail -n +8 | xargs -r rm || true
              echo "Database backup created: $BACKUP_FILE.gz"
            else
              echo "Database container not running, skipping backup"
            fi

  deploy:
    runs-on: ubuntu-latest
    environment: production
    needs: [wait-for-builds, backup]
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435

      - name: Login to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve backend image digest
        id: digest-backend
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/debatelab/evidence-backend:sha-${GITHUB_SHA}"
          docker pull "$IMAGE" || docker pull ghcr.io/debatelab/evidence-backend:latest
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ghcr.io/debatelab/evidence-backend:sha-${GITHUB_SHA} 2>/dev/null || true)
          if [ -z "$DIGEST" ]; then
            DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ghcr.io/debatelab/evidence-backend:latest)
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Resolve frontend image digest
        id: digest-frontend
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/debatelab/evidence-frontend:sha-${GITHUB_SHA}"
          docker pull "$IMAGE" || docker pull ghcr.io/debatelab/evidence-frontend:latest
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ghcr.io/debatelab/evidence-frontend:sha-${GITHUB_SHA} 2>/dev/null || true)
          if [ -z "$DIGEST" ]; then
            DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ghcr.io/debatelab/evidence-frontend:latest)
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@55dabf81b49d4120609345970c91507e2d734799
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -euo pipefail
            GITHUB_SHA="${{ github.sha }}"
            cd /opt/evidence-seeker-platform

            DOCKER_COMPOSE="docker compose --env-file backend/.env.prod -f docker-compose.prod.yml"

            echo "Syncing repository to deployed commit"
            git fetch origin
            git checkout "${GITHUB_SHA}"

            # Inject digests directly as shell variables (embed the values)
            BACKEND_IMAGE="${{ steps.digest-backend.outputs.digest }}"
            FRONTEND_IMAGE="${{ steps.digest-frontend.outputs.digest }}"

            # Export environment variables for Docker Compose
            export BACKEND_IMAGE="${BACKEND_IMAGE}"
            export FRONTEND_IMAGE="${FRONTEND_IMAGE}"

            # Ensure required DB env vars are present for docker compose.
            # Load DB-related vars from backend/.env.prod without executing it (handles spaces safely)
            ENV_EXPORTS="$(python3 - <<'PY'
            import shlex
            from pathlib import Path

            env_path = Path("backend/.env.prod")
            keys = {"DATABASE_URL", "POSTGRES_DB", "POSTGRES_USER", "POSTGRES_PASSWORD"}
            if env_path.exists():
                for raw in env_path.read_text().splitlines():
                    line = raw.strip()
                    if not line or line.startswith("#") or "=" not in line:
                        continue
                    key, val = map(str.strip, line.split("=", 1))
                    if key not in keys:
                        continue
                    if val and (val[0] == val[-1]) and val[0] in ("'", '"'):
                        val = val[1:-1]
                    print(f'export {key}={shlex.quote(val)}')
            PY
            )"
            eval "${ENV_EXPORTS}"

            if [ -n "${DATABASE_URL:-}" ]; then
              eval "$(python3 - <<'PY'
            import os
            import urllib.parse
            import shlex

            url = os.environ.get("DATABASE_URL")
            if url:
                parsed = urllib.parse.urlparse(url)
                user = parsed.username or ""
                password = parsed.password or ""
                db = parsed.path.lstrip("/") if parsed.path else ""
                for key, val in (
                    ("POSTGRES_USER", user),
                    ("POSTGRES_PASSWORD", password),
                    ("POSTGRES_DB", db),
                ):
                    if val:
                        print(f'export {key}={shlex.quote(val)}')
            PY
              )"
            fi

            : "${POSTGRES_DB:?POSTGRES_DB missing; set in backend/.env.prod or embed in DATABASE_URL}"
            : "${POSTGRES_USER:?POSTGRES_USER missing; set in backend/.env.prod or embed in DATABASE_URL}"
            : "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD missing; set in backend/.env.prod or embed in DATABASE_URL}"

            echo "Using backend image digest: ${BACKEND_IMAGE}"
            echo "Using frontend image digest: ${FRONTEND_IMAGE}"

            # Login to GHCR on production server
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "Stopping existing stack"
            ${DOCKER_COMPOSE} down --remove-orphans || true

            echo "Freeing Docker disk space"
            docker system df || true
            docker container prune -f || true
            docker image prune -af || true
            docker builder prune -af || true

            echo "Starting database"
            ${DOCKER_COMPOSE} up -d db

            echo "Waiting for database to become healthy..."
            for i in {1..15}; do
              if ${DOCKER_COMPOSE} exec -T db pg_isready -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" >/dev/null 2>&1; then
                echo "Database is ready"
                break
              fi
              echo "Database not ready, waiting 5s... (attempt $i/15)"
              sleep 5
            done

            echo "Running migrations"
            ${DOCKER_COMPOSE} run --rm backend alembic upgrade head

            echo "Starting updated stack"
            ${DOCKER_COMPOSE} up -d --remove-orphans

            echo "Waiting for services to start up..."
            sleep 30
            
            echo "Checking container status..."
            ${DOCKER_COMPOSE} ps
            
            echo "Checking backend logs..."
            ${DOCKER_COMPOSE} logs backend --tail=20
            
            echo "Testing backend health..."
            for i in {1..10}; do
                if curl -fsS http://localhost:8000/health; then
                    echo "Backend health check passed"
                    break
                else
                    echo "Backend not ready, waiting 10s... (attempt $i/10)"
                    sleep 10
                fi
            done
            
            PROD_DOMAIN="evidence-seeker.philosophie.kit.edu"

            echo "Testing frontend HTTPS endpoint..."
            for i in {1..10}; do
                if curl -fsS --resolve "${PROD_DOMAIN}:443:127.0.0.1" "https://${PROD_DOMAIN}/health" > /dev/null; then
                    echo "Frontend health check passed"
                    break
                else
                    echo "Frontend not ready, waiting 10s... (attempt $i/10)"
                    sleep 10
                fi
            done
            
            echo "Final health verification"
            curl -fsS http://localhost:8000/health > /dev/null
            curl -fsS --resolve "${PROD_DOMAIN}:443:127.0.0.1" "https://${PROD_DOMAIN}/health" > /dev/null

            docker image prune -f > /dev/null || true
            echo "Deployment complete"
      - name: Post-deployment smoke tests
        uses: appleboy/ssh-action@55dabf81b49d4120609345970c91507e2d734799
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -euo pipefail
            curl -fsS http://localhost:8000/health > /dev/null
            PROD_DOMAIN="evidence-seeker.philosophie.kit.edu"
            curl -fsS --resolve "${PROD_DOMAIN}:443:127.0.0.1" "https://${PROD_DOMAIN}/health" > /dev/null
            echo "Smoke tests OK (backend + frontend health)"

      - name: Slack notify success
        if: success()
        run: |
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"✅ Deploy succeeded for ${GITHUB_SHA}\"}" \
              "${{ secrets.SLACK_WEBHOOK_URL }}" || true
          else
            echo "No Slack webhook URL configured; skipping notification."
          fi

      - name: Slack notify failure
        if: failure()
        run: |
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"❌ Deploy failed for ${GITHUB_SHA}\"}" \
              "${{ secrets.SLACK_WEBHOOK_URL }}" || true
          else
            echo "No Slack webhook URL configured; skipping notification."
          fi

  rollback:
    runs-on: ubuntu-latest
    environment: production
    needs: [deploy]
    if: failure()
    steps:
      - name: Rollback to previous version
        uses: appleboy/ssh-action@55dabf81b49d4120609345970c91507e2d734799
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/evidence-seeker-platform
            DOCKER_COMPOSE="docker compose --env-file backend/.env.prod -f docker-compose.prod.yml"

            ${DOCKER_COMPOSE} down || true
            ${DOCKER_COMPOSE} pull
            ${DOCKER_COMPOSE} up -d --no-build
            echo "Rollback completed successfully"
