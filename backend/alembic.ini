# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
# defaults to the current working directory.
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# If specified, requires the python-dateutil library that can understand
# timestamps and performs timezone conversions
# timezone =

# max length of characters to apply to the "slug" field
# max_file_length = 40

# If left empty, public key is the first .pem file found in the target
# directory
# public_key =

# should a file be created with the migration revision number
# revision_environment = false

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# file_template = %%(rev)s_%%(slug)s

# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# By default, values in the following formats are understood by alembic:
#     YYYY-MM-DD HH:MM:SS
#     YYYY-MM-DD HH:MM:SS.SSSSSS
#     YYYY-MM-DD
#     HH:MM:SS
#     HH:MM:SS.SSSSSS
#     HH:MM
#     HH
# dateutil_relative_special = today

# If this is true, the config file is expected to have a literal value for
# x argument
# literal_binds = false

# set to 'true' to run the environment during a downgrade.
# downgrade_module_path = alembic:env.py

# set to 'true' to run the environment during an upgrade.
# upgrade_module_path = alembic:env.py

# set to 'true' to run the environment during a downgrade.
# downgrade_module_path = alembic:env.py

# set to 'true' to run the environment during an upgrade.
# upgrade_module_path = alembic:env.py

# set to 'true' to run the environment during a downgrade.
# downgrade_module_path = alembic:env.py

# set to 'true' to run the environment during an upgrade.
# upgrade_module_path = alembic:env.py

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# Database configuration
[database]
# Database URL (will be overridden by environment variable)
sqlalchemy.url = postgresql://evidence_user:evidence_password@localhost:5432/evidence_seeker
